<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuzzerBet — Offline</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body {
    background:#08090f;
    color:#f0f0f8;
    font-family:'Rajdhani',sans-serif;
    height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:24px;
  }
  .icon { font-size:64px; margin-bottom:24px; animation:float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  h1 {
    font-family:'Orbitron',sans-serif;
    font-size:28px;
    font-weight:900;
    color:#FFD700;
    letter-spacing:3px;
    margin-bottom:12px;
  }
  p { font-size:15px; color:#6a6a8a; max-width:280px; line-height:1.6; margin-bottom:32px; }
  button {
    padding:14px 36px;
    background:linear-gradient(135deg,#B8860B,#FFD700);
    color:#08090f;
    border:none;
    border-radius:999px;
    font-family:'Orbitron',sans-serif;
    font-size:12px;
    font-weight:700;
    letter-spacing:2px;
    cursor:pointer;
  }
  .dots { display:flex; gap:6px; justify-content:center; margin-top:32px; }
  .dot {
    width:8px; height:8px; border-radius:50%;
    background:#FFD700; opacity:.3;
    animation:dotPulse 1.4s infinite;
  }
  .dot:nth-child(2){animation-delay:.2s}
  .dot:nth-child(3){animation-delay:.4s}
  @keyframes dotPulse{0%,80%,100%{opacity:.3}40%{opacity:1}}
</style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>YOU'RE OFFLINE</h1>
  <p>No internet connection detected. Check your connection and try again to get back in the game.</p>
  <button onclick="window.location.reload()">RETRY CONNECTION</button>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</body>
</html>
