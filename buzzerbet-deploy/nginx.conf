# BuzzerBet — nginx reverse proxy config
# Place at: /etc/nginx/sites-available/buzzerbet
# Then: ln -s /etc/nginx/sites-available/buzzerbet /etc/nginx/sites-enabled/
#
# Get SSL cert first:
#   sudo certbot --nginx -d yourdomain.com

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL (certbot fills these in automatically)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    # Cache static assets (icons, manifest, pwa.js)
    location ~* \.(png|jpg|ico|json|js|css|woff2?)$ {
        proxy_pass         http://localhost:3000;
        proxy_set_header   Host $host;
        expires            7d;
        add_header         Cache-Control "public, immutable";
    }

    # Service worker — never cache (must always be fresh)
    location = /sw.js {
        proxy_pass       http://localhost:3000;
        proxy_set_header Host $host;
        add_header       Cache-Control "no-cache, no-store, must-revalidate";
        expires          0;
    }

    # Socket.IO — requires WebSocket upgrade
    location /socket.io/ {
        proxy_pass             http://localhost:3000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     86400s;   # keep WebSocket connections alive
        proxy_send_timeout     86400s;
    }

    # All other requests → Node app
    location / {
        proxy_pass             http://localhost:3000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_cache_bypass     $http_upgrade;
    }
}
